can_short: true
cost_model:
  fee: 0.001
  slippage_bps: 5
  funding_rate_included: false
  notes:
  - Freqtrade CLI 当前接入 fee
  - slippage 和 funding 仍需单独补充研究或执行层建模
derived_indicators:
- formula: dataframe['ma'].diff(3)
  name: ma_slope
description: 多空切换策略 V2 - 支持因子配置的参数化策略
entry_conditions:
  long: '(dataframe[''close''] > dataframe[''ma'']) &

    (dataframe[''ma_slope''] > 0) &

    (dataframe[''rsi''] < rsi_oversold)

    '
  short: '(dataframe[''close''] < dataframe[''ma'']) &

    (dataframe[''ma_slope''] < 0) &

    (dataframe[''rsi''] > rsi_overbought)

    '
exit_conditions:
  long: '(dataframe[''rsi''] > rsi_overbought) |

    (dataframe[''close''] < dataframe[''ma''])

    '
  short: '(dataframe[''rsi''] < rsi_oversold) |

    (dataframe[''close''] > dataframe[''ma''])

    '
factors:
  bb:
    enabled: false
    period: 20
    std: 2.0
    std_range:
    - 1.5
    - 3.0
  ma:
    enabled: true
    period: 204
    range:
    - 100
    - 300
    space: buy
    type: SMA
  macd:
    enabled: false
    fast: 12
    signal: 9
    slow: 26
  rsi:
    enabled: true
    period: 18
    range:
    - 7
    - 21
    space: buy
  rsi_overbought:
    enabled: true
    range:
    - 65
    - 80
    space: sell
    value: 65
  rsi_oversold:
    enabled: true
    range:
    - 20
    - 35
    space: buy
    value: 32.5
  volume:
    enabled: false
    ma_period: 20
    ratio_threshold: 1.5
margin_mode: isolated
minimal_roi:
  '0': 0.02
name: Multi-LS V2
optimization:
  epochs: 200
  hyperopt_loss: ShortTradeDurHyperOptLoss
  timerange: 20250101-20250930
risk_model:
  max_open_trades: 3
  max_daily_loss_pct: 3.0
  max_drawdown_pct: 20.0
  max_consecutive_losses: 3
  cooldown_candles_after_loss_streak: 12
  protections_in_config_required: true
  notes:
  - 当前 YAML 负责定义风险边界
  - 部分风控需在 Freqtrade config 或执行层继续实现
stoploss: -0.05
train_timerange: 20250101-20250930
validation_timerange: 20251001-20251130
test_timerange: 20251201-
timeframe: 15m
trading_mode: futures
trailing_stop: true
trailing_stop_positive: 0.02
trailing_stop_positive_offset: 0.025
version: '2.0'
