---
services:
  freqtrade:
    image: ai-ouyi/freqtrade:proxy
    # image: freqtradeorg/freqtrade:develop
    # Use plotting image
    # image: freqtradeorg/freqtrade:develop_plot
    # # Enable GPU Image and GPU Resources (only relevant for freqAI)
    # # Make sure to uncomment the whole deploy section
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # Build custom image to ensure all API clients (including requests/ccxt sync path)
    # support SOCKS proxy routing.
    build:
      context: .
      dockerfile: "./docker/Dockerfile.custom"
    restart: unless-stopped
    container_name: freqtrade
    env_file:
      - ../../.env
    environment:
      - ALL_PROXY=socks5h://host.docker.internal:7897
      - HTTP_PROXY=socks5h://host.docker.internal:7897
      - HTTPS_PROXY=socks5h://host.docker.internal:7897
      - NO_PROXY=127.0.0.1,localhost,host.docker.internal
    volumes:
      - "./user_data:/freqtrade/user_data"
      - "../../strategies:/freqtrade/user_data/strategies"
    # Expose api on port 8080 (localhost only)
    # Please read the https://www.freqtrade.io/en/stable/rest-api/ documentation
    # for more information.
    ports:
      - "127.0.0.1:8080:8080"
    # Default command used when running `docker compose up`
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy GridLsV1Strategy
