name: "Scalping V1"
description: "激进 Scalping 策略 - 5m 框架，使用 Grid-LS 逻辑"
version: "6.0"

trading_mode: "futures"
margin_mode: "isolated"

timeframe: "5m"
can_short: true

stoploss: -0.11
minimal_roi:
  "0": 0.032
  "60": 0.012

trailing_stop: true
trailing_stop_positive: 0.012
trailing_stop_positive_offset: 0.02

cost_model:
  fee: 0.0006

factors:
  ma:
    enabled: true
    type: "EMA"
    period: 54
    range: [30, 80]
    space: "buy"
  
  rsi:
    enabled: true
    period: 11
    range: [7, 21]
    space: "buy"
  
  rsi_oversold:
    enabled: true
    value: 34
    range: [20, 40]
    space: "buy"
  
  rsi_overbought:
    enabled: true
    value: 66
    range: [60, 80]
    space: "sell"
  
  bb:
    enabled: true
    period: 38
    std: 1.9
    std_range: [1.5, 2.5]
  
  volume:
    enabled: true
    ma_period: 16
    ratio_threshold: 0.9

derived_indicators:
  - name: "ema_fast"
    formula: "ta.EMA(dataframe['close'], timeperiod=21)"
  - name: "ema_slow"
    formula: "ta.EMA(dataframe['close'], timeperiod=89)"
  - name: "adx"
    formula: "ta.ADX(dataframe['high'], dataframe['low'], dataframe['close'], timeperiod=14)"
  - name: "atr"
    formula: "ta.ATR(dataframe['high'], dataframe['low'], dataframe['close'], timeperiod=14)"
  - name: "atr_pct"
    formula: "dataframe['atr'] / dataframe['close'].replace(0, np.nan)"
  - name: "zscore"
    formula: "(dataframe['close'] - dataframe['bb_middle']) / (dataframe['bb_upper'] - dataframe['bb_lower']).replace(0, np.nan)"

entry_conditions:
  long: |
    (
      (
        (dataframe['adx'] <= 23) &
        (dataframe['close'] <= dataframe['bb_lower'] * 1.002) &
        (dataframe['rsi'] <= rsi_oversold)
      ) |
      (
        (dataframe['ema_fast'] > dataframe['ema_slow']) &
        (dataframe['zscore'] <= -0.9) &
        (dataframe['atr_pct'] <= 0.032)
      )
    ) &
    (dataframe['volume_ratio'] >= 0.9)
  
  short: |
    (
      (
        (dataframe['adx'] <= 23) &
        (dataframe['close'] >= dataframe['bb_upper'] * 0.998) &
        (dataframe['rsi'] >= rsi_overbought)
      ) |
      (
        (dataframe['ema_fast'] < dataframe['ema_slow']) &
        (dataframe['zscore'] >= 0.9) &
        (dataframe['atr_pct'] <= 0.032)
      )
    ) &
    (dataframe['volume_ratio'] >= 0.9)

exit_conditions:
  long: |
    (dataframe['close'] >= dataframe['bb_middle']) |
    ((dataframe['rsi'] >= 54) & (dataframe['zscore'] >= -0.1)) |
    (dataframe['atr_pct'] >= 0.045)
  
  short: |
    (dataframe['close'] <= dataframe['bb_middle']) |
    ((dataframe['rsi'] <= 46) & (dataframe['zscore'] <= 0.1)) |
    (dataframe['atr_pct'] >= 0.045)

risk_model:
  max_open_trades: 4
  max_daily_loss_pct: 3.0
  max_drawdown_pct: 18.0
  max_consecutive_losses: 4
  cooldown_candles_after_loss_streak: 8
  protections_in_config_required: true

train_timerange: "20250101-20250301"
validation_timerange: "20250301-20250401"
test_timerange: "20250401-20250501"