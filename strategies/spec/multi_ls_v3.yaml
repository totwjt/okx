name: Multi-LS V3
description: 多空结构化策略 V3（Regime + TrendBreakout + RangeReversal + RiskBudget）
version: '3.0'

trading_mode: futures
margin_mode: isolated
timeframe: 15m
can_short: true

stoploss: -0.12
minimal_roi:
  '0': 0.09
  '90': 0.03
  '240': 0.0
trailing_stop: false

cost_model:
  fee: 0.001
  slippage_bps: 5
  funding_rate_included: false
  notes:
  - 回测已接入 fee
  - slippage/funding 仍需执行层与研究层补充

risk_model:
  max_open_trades: 3
  max_daily_loss_pct: 3.0
  max_drawdown_pct: 22.0
  max_consecutive_losses: 3
  cooldown_candles_after_loss_streak: 12
  protections_in_config_required: true

factors:
  ma:
    enabled: false
    period: 200
    range: [80, 280]
    space: buy
    type: EMA
  rsi:
    enabled: true
    period: 14
    range: [7, 21]
    space: buy
  rsi_oversold:
    enabled: true
    value: 30
    range: [18, 40]
    space: buy
  rsi_overbought:
    enabled: true
    value: 70
    range: [60, 85]
    space: sell
  bb:
    enabled: true
    period: 20
    std: 2.0
    std_range: [1.6, 2.8]
    width_trend_min: 0.028
    width_trend_range: [0.015, 0.050]
    width_range_max: 0.022
    width_range_max_range: [0.010, 0.040]
  volume:
    enabled: true
    ma_period: 20
    ratio_threshold: 0.95
    ratio_range: [0.60, 2.50]
  adx:
    enabled: true
    period: 14
    period_range: [7, 28]
    trend_min: 24
    trend_min_range: [18, 36]
    range_max: 16
    range_max_range: [8, 24]
  atr:
    enabled: true
    period: 14
    period_range: [7, 28]
    entry_max: 0.032
    entry_max_range: [0.015, 0.060]
    exit_max: 0.037
    exit_max_range: [0.020, 0.080]
  zscore:
    enabled: true
    period: 32
    period_range: [12, 72]
    entry_abs: 1.15
    entry_abs_range: [0.60, 2.20]
    exit_abs: 0.35
    exit_abs_range: [0.10, 1.20]
  donchian:
    enabled: true
    period: 20
    period_range: [10, 55]
  macd:
    enabled: false
    fast: 12
    slow: 26
    signal: 9

derived_indicators:
  - name: ema_fast
    formula: ta.EMA(dataframe['close'], timeperiod=21)
  - name: ema_slow
    formula: ta.EMA(dataframe['close'], timeperiod=55)
  - name: ema_trend
    formula: ta.EMA(dataframe['close'], timeperiod=180)
  - name: bb_width
    formula: (dataframe['bb_upper'] - dataframe['bb_lower']) / dataframe['bb_middle'].replace(0, np.nan)
  - name: rsi_slope
    formula: dataframe['rsi'].diff(2)
  - name: trend_strength
    formula: (dataframe['ema_fast'] - dataframe['ema_slow']) / dataframe['close'].replace(0, np.nan)

entry_conditions:
  long: |
    (
      (
        (dataframe['ema_fast'] > dataframe['ema_slow']) &
        (dataframe['close'] > dataframe['ema_trend']) &
        (dataframe['adx'] >= adx_trend_min) &
        (dataframe['bb_width'] >= bb_width_trend_min) &
        (dataframe['close'] > dataframe['donchian_high'].shift(1))
      ) |
      (
        (dataframe['adx'] <= adx_range_max) &
        (dataframe['bb_width'] <= bb_width_range_max) &
        (dataframe['close'] <= dataframe['bb_lower']) &
        (dataframe['zscore'] <= -zscore_entry_abs) &
        (dataframe['rsi'] <= rsi_oversold)
      ) |
      (
        (dataframe['rsi'] <= rsi_oversold - 3) &
        (dataframe['zscore'] <= -zscore_entry_abs * 1.20) &
        (dataframe['rsi_slope'] > 0)
      )
    ) &
    (dataframe['atr_pct'] <= atr_entry_max) &
    (dataframe['volume_ratio'] >= volume_ratio_threshold)
  short: |
    (
      (
        (dataframe['ema_fast'] < dataframe['ema_slow']) &
        (dataframe['close'] < dataframe['ema_trend']) &
        (dataframe['adx'] >= adx_trend_min) &
        (dataframe['bb_width'] >= bb_width_trend_min) &
        (dataframe['close'] < dataframe['donchian_low'].shift(1))
      ) |
      (
        (dataframe['adx'] <= adx_range_max) &
        (dataframe['bb_width'] <= bb_width_range_max) &
        (dataframe['close'] >= dataframe['bb_upper']) &
        (dataframe['zscore'] >= zscore_entry_abs) &
        (dataframe['rsi'] >= rsi_overbought)
      ) |
      (
        (dataframe['rsi'] >= rsi_overbought + 3) &
        (dataframe['zscore'] >= zscore_entry_abs * 1.20) &
        (dataframe['rsi_slope'] < 0)
      )
    ) &
    (dataframe['atr_pct'] <= atr_entry_max) &
    (dataframe['volume_ratio'] >= volume_ratio_threshold)

exit_conditions:
  long: |
    (
      ((dataframe['ema_fast'] > dataframe['ema_slow']) & (dataframe['close'] < dataframe['ema_fast'])) |
      ((dataframe['adx'] <= adx_range_max) & (dataframe['close'] >= dataframe['bb_middle'])) |
      (dataframe['zscore'] >= -zscore_exit_abs) |
      (dataframe['atr_pct'] >= atr_exit_max)
    )
  short: |
    (
      ((dataframe['ema_fast'] < dataframe['ema_slow']) & (dataframe['close'] > dataframe['ema_fast'])) |
      ((dataframe['adx'] <= adx_range_max) & (dataframe['close'] <= dataframe['bb_middle'])) |
      (dataframe['zscore'] <= zscore_exit_abs) |
      (dataframe['atr_pct'] >= atr_exit_max)
    )

optimization:
  epochs: 300
  hyperopt_loss: ShortTradeDurHyperOptLoss
  timerange: 20250101-20250930

train_timerange: 20250101-20250930
validation_timerange: 20251001-20251130
test_timerange: 20251201-
